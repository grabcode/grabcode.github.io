<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body class="page-{{ page.title | slugify }}">
    {% include header.html %}

    <main class="page-content">
      {% if page.full_width %}
        {{ content }}
      {% else %}
        <div class="wrap">
          {{ content }}
        </div>
      {% endif %}
    </main>

    {% include footer.html %}
    {% include analytics.html %}
    <script src="{{ "/js/effects.js" | prepend: site.baseurl }}"></script>
  </body>
</html>
